<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF7F3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Serif+JP:wght@400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=Noto+Sans+Hebrew:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500;600&family=Yuji+Mai&family=Shippori+Mincho:wght@500;700;800&family=Archivo+Black&display=swap" rel="stylesheet" />
    <title>日本語道場</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;
        min-height: 100vh; min-height: 100dvh;
        background:
          radial-gradient(circle at 12% 8%, rgba(188,0,45,0.055) 0%, transparent 42%),
          radial-gradient(circle at 88% 92%, rgba(124,58,237,0.045) 0%, transparent 48%),
          linear-gradient(160deg, #FBF5EE 0%, #FAF7F3 45%, #F5F0E6 100%);
        background-attachment: fixed;
        color: #141414;
      }
      body { font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif; overscroll-behavior: none; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
      @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-4px); } 40%, 80% { transform: translateX(4px); } }
      @keyframes countUp { from { opacity: 0; letter-spacing: 0.2em; } to { opacity: 1; letter-spacing: 0em; } }
      @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes logoGlow  { 0%, 100% { opacity: 0.25; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.12); } }
      @keyframes sealStamp { 0% { transform: scale(1); } 30% { transform: scale(0.92) rotate(-2deg); } 60% { transform: scale(1.04) rotate(1.5deg); } 100% { transform: scale(1) rotate(0); } }
      @keyframes ringDraw  { 0% { stroke-dashoffset: 380; opacity: 0; } 50% { opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 1; } }
      @keyframes shimmer   { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes flameFlicker { 0%, 100% { transform: scale(1) rotate(-1deg); filter: brightness(1); } 50% { transform: scale(1.08) rotate(2deg); filter: brightness(1.25); } }
      @keyframes staggerIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes drawPath { from { stroke-dashoffset: var(--len, 1000); } to { stroke-dashoffset: 0; } }
      @keyframes drawArc  { from { stroke-dashoffset: var(--circ, 339); } to { stroke-dashoffset: var(--target, 0); } }
      @keyframes streakPulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.06); filter: brightness(1.15); } }
      @keyframes briefShine { 0% { transform: translateX(-110%); } 60% { transform: translateX(120%); } 100% { transform: translateX(120%); } }
      @keyframes counterTick { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes wmDrift { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-6px, -8px) rotate(-1deg); } }
      @keyframes auroraDriftA { 0%, 100% { transform: translate(0,0) scale(1); }     33% { transform: translate(8%, -4%) scale(1.1); }   66% { transform: translate(-6%, 6%) scale(0.95); } }
      @keyframes auroraDriftB { 0%, 100% { transform: translate(0,0) scale(1); }     33% { transform: translate(-10%, 5%) scale(1.05); } 66% { transform: translate(6%, -8%) scale(0.92); } }
      @keyframes auroraDriftC { 0%, 100% { transform: translate(0,0) scale(1); }     50% { transform: translate(4%, 8%) scale(1.15); } }
      @keyframes hueShift     { 0%, 100% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(12deg); } }
      @keyframes kanjiPaint   { 0% { stroke-dashoffset: 1200; opacity: 0; } 30% { opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 1; } }
      @keyframes kanjiGlow    { 0%, 100% { filter: drop-shadow(0 0 18px rgba(188,0,45,0.45)) drop-shadow(0 0 50px rgba(124,58,237,0.25)); } 50% { filter: drop-shadow(0 0 28px rgba(217,24,64,0.6)) drop-shadow(0 0 70px rgba(124,58,237,0.4)); } }
      @keyframes ringSpinSlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes liveDot      { 0%, 100% { opacity: 0.45; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1.1); } }
      @keyframes meshHueRoll  { 0% { background-position: 0% 0%, 100% 0%, 50% 100%, 0% 0%; } 100% { background-position: 100% 100%, 0% 100%, 50% 0%, 0% 0%; } }
      .fade-in { animation: fadeIn 0.3s ease-out both; }
      .slide-up { animation: slideUp 0.35s ease-out both; }
      .pop-in { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
      .count-up { animation: countUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
      .stagger > * { animation: staggerIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
      .stagger > *:nth-child(1)  { animation-delay: 30ms; }
      .stagger > *:nth-child(2)  { animation-delay: 60ms; }
      .stagger > *:nth-child(3)  { animation-delay: 90ms; }
      .stagger > *:nth-child(4)  { animation-delay: 120ms; }
      .stagger > *:nth-child(5)  { animation-delay: 150ms; }
      .stagger > *:nth-child(6)  { animation-delay: 180ms; }
      .stagger > *:nth-child(7)  { animation-delay: 210ms; }
      .stagger > *:nth-child(8)  { animation-delay: 240ms; }
      .stagger > *:nth-child(9)  { animation-delay: 270ms; }
      .stagger > *:nth-child(10) { animation-delay: 300ms; }
      .logo-wrap { position: relative; display: inline-block; cursor: pointer; transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
      .logo-wrap::before {
        content: ""; position: absolute; inset: -10%; border-radius: 50%;
        background: radial-gradient(circle, rgba(188,0,45,0.28) 0%, rgba(188,0,45,0.10) 40%, transparent 70%);
        filter: blur(28px); z-index: -1; opacity: 0.5;
        animation: logoGlow 4.5s ease-in-out infinite;
        transform: translate(-50%, -50%); left: 50%; top: 50%;
        width: 100%; height: 100%;
      }
      .logo-wrap--light::before { display: none; }
      .logo-wrap:hover { transform: translateY(-2px) scale(1.025); }
      .logo-wrap:active { animation: sealStamp 0.45s cubic-bezier(0.2, 0.8, 0.2, 1); }
      .logo-img { animation: logoFloat 5s ease-in-out infinite; display: block; }
      .logo-ring { position: absolute; inset: -4%; width: 108%; height: 108%; pointer-events: none; }
      .logo-ring circle { fill: none; stroke: #BC002D; stroke-width: 1.5; stroke-dasharray: 380; stroke-dashoffset: 380; opacity: 0; transition: opacity 0.3s; }
      .logo-wrap:hover .logo-ring circle { animation: ringDraw 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      .progress-shine { position: relative; overflow: hidden; }
      .progress-shine::after {
        content: ""; position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
        background-size: 200% 100%; animation: shimmer 2.4s linear infinite; pointer-events: none;
      }
      .flame-flicker { display: inline-block; animation: flameFlicker 0.9s ease-in-out infinite; transform-origin: center bottom; }
      .btn-hover { transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease; }
      .btn-hover:hover:not(:disabled) { transform: translateY(-1px); }
      .btn-hover:active:not(:disabled) { transform: translateY(1px); }
      .choice-hover { transition: background 0.18s ease, border-color 0.18s ease, transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1); }
      .choice-hover:hover:not(:disabled) { background: #F5F2EC; border-color: #CFC9BC; transform: translateX(2px); }
      .choice-hover:active:not(:disabled) { transform: translateX(2px) scale(0.995); }
      /* PREMIUM CARD — gradient border on hover, subtle lift */
      .premium-card {
        position: relative; isolation: isolate; transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.25s ease;
      }
      .premium-card::before {
        content: ""; position: absolute; inset: 0; padding: 1px; border-radius: inherit; pointer-events: none; z-index: 1;
        background: linear-gradient(135deg, rgba(188,0,45,0.55) 0%, rgba(124,58,237,0.35) 50%, rgba(217,24,64,0.45) 100%);
        -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude;
        opacity: 0; transition: opacity 0.25s ease;
      }
      .premium-card:hover { transform: translateY(-2px); box-shadow: 0 2px 4px rgba(80,60,30,0.06), 0 18px 40px -16px rgba(188,0,45,0.18); }
      .premium-card:hover::before { opacity: 1; }
      /* CATEGORY TILE — hover lift + accent slide-in */
      .cat-tile { position: relative; overflow: hidden; transition: transform 0.18s cubic-bezier(0.2,0.8,0.2,1), border-color 0.2s, background 0.2s, box-shadow 0.2s; }
      .cat-tile::after {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
        background: linear-gradient(180deg, #BC002D 0%, #7C3AED 100%);
        transform: scaleY(0); transform-origin: top; transition: transform 0.25s cubic-bezier(0.2,0.8,0.2,1);
        border-radius: 0 2px 2px 0;
      }
      .cat-tile:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px -6px rgba(80,60,30,0.20); }
      .cat-tile:hover:not(:disabled)::after { transform: scaleY(1); }
      /* BIG START — gradient sweep + shimmer */
      .start-mega {
        position: relative; overflow: hidden; isolation: isolate;
        background: linear-gradient(135deg, #BC002D 0%, #D91840 50%, #BC002D 100%);
        background-size: 220% 220%; background-position: 0% 50%;
        transition: background-position 0.5s ease, transform 0.18s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.25s ease;
        box-shadow: 0 1px 2px rgba(188,0,45,0.18), 0 14px 36px -12px rgba(188,0,45,0.50);
      }
      .start-mega:hover:not(:disabled) { background-position: 100% 50%; transform: translateY(-2px); box-shadow: 0 2px 4px rgba(188,0,45,0.25), 0 22px 50px -14px rgba(188,0,45,0.65); }
      .start-mega:active:not(:disabled) { transform: translateY(0); }
      .start-mega::after {
        content: ""; position: absolute; top: 0; left: 0; bottom: 0; width: 40%;
        background: linear-gradient(100deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
        animation: briefShine 3.4s ease-in-out infinite; pointer-events: none;
      }
      .start-mega:disabled::after { display: none; }
      .start-arrow { display: inline-block; transition: transform 0.25s cubic-bezier(0.2,0.8,0.2,1); }
      .start-mega:hover:not(:disabled) .start-arrow { transform: translateX(4px); }
      /* COUNTER TICK — used to pop in big stat numbers on mount */
      .counter-tick { animation: counterTick 0.6s cubic-bezier(0.2,0.8,0.2,1) both; }
      .streak-pulse { animation: streakPulse 1.6s ease-in-out infinite; transform-origin: center; }
      /* PAGE WATERMARK — huge faint kanji behind hero */
      .page-watermark {
        position: absolute; top: 50%; right: -6%; transform: translateY(-50%); z-index: 0; pointer-events: none;
        font-family: 'Noto Serif JP', serif; font-weight: 900; font-size: 580px; line-height: 0.9;
        color: rgba(188,0,45,0.045); letter-spacing: -0.05em;
        animation: wmDrift 18s ease-in-out infinite;
      }
      @media (max-width: 600px) {
        .page-watermark { font-size: 380px; right: -18%; opacity: 0.7; }
      }
      /* AURORA MESH BACKDROP — full-bleed dark gradient mesh that drifts behind the menu */
      .aurora-root {
        position: relative; isolation: isolate;
        --ink: #FFFFFF;
        --ink-dim: rgba(255,255,255,0.85);
        --muted: rgba(255,255,255,0.68);
        --faint: rgba(255,255,255,0.50);
        --hairline: rgba(255,255,255,0.10);
        --hairline-strong: rgba(255,255,255,0.16);
        --accent: #FCA5A5;
        --accent-strong: #F43A5C;
        --accent-bg: rgba(244,58,92,0.20);
        --accent-border: rgba(244,58,92,0.45);
        --pass: #34D399;
        --kanji-tint: #C4B5FD;
        --soft-bg: rgba(255,255,255,0.06);
      }
      html.theme-light .aurora-root {
        --ink: #141414;
        --ink-dim: #2F2F2F;
        --muted: #5C564A;
        --faint: #8B8474;
        --hairline: rgba(80,60,30,0.10);
        --hairline-strong: rgba(80,60,30,0.16);
        --accent: #BC002D;
        --accent-strong: #BC002D;
        --accent-bg: rgba(188,0,45,0.10);
        --accent-border: rgba(188,0,45,0.32);
        --pass: #0F8F47;
        --kanji-tint: #6D28D9;
        --soft-bg: rgba(0,0,0,0.04);
      }
      .aurora-root::before {
        content: ""; position: fixed; inset: 0; z-index: -2; pointer-events: none;
        background: radial-gradient(ellipse at 50% 50%, #3d1530 0%, #251128 60%, #14081a 100%);
      }
      .aurora-bg { position: fixed; inset: -10%; z-index: -1; pointer-events: none; overflow: hidden; }
      .aurora-blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.55; mix-blend-mode: screen; will-change: transform; }
      .aurora-blob.a { top: -10%; left: -8%;  width: 60vw; height: 55vw; background: radial-gradient(circle, #F43A5C 0%, transparent 65%); animation: auroraDriftA 22s ease-in-out infinite; opacity: 0.65; }
      .aurora-blob.b { top: 10%; right: -12%; width: 55vw; height: 50vw; background: radial-gradient(circle, #A78BFA 0%, transparent 65%); animation: auroraDriftB 26s ease-in-out infinite; opacity: 0.6; }
      .aurora-blob.c { bottom: -15%; left: 20%; width: 70vw; height: 50vw; background: radial-gradient(circle, #FB923C 0%, transparent 60%); animation: auroraDriftC 30s ease-in-out infinite; opacity: 0.45; }
      .aurora-grain::before {
        content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 3px 3px, 7px 7px; background-position: 0 0, 1px 1px;
        mix-blend-mode: overlay; opacity: 0.5;
      }
      html:has(.aurora-root), body:has(.aurora-root) { background: transparent !important; }
      /* GLASS CARD — denser bg to stop red aurora bleed */
      .glass {
        background: linear-gradient(160deg, rgba(28,18,38,0.82) 0%, rgba(20,12,28,0.86) 100%);
        backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid rgba(255,255,255,0.16);
        box-shadow: 0 1px 0 rgba(255,255,255,0.10) inset, 0 24px 70px -28px rgba(0,0,0,0.65);
        color: #FFFFFF;
      }
      .glass-strong {
        background: linear-gradient(160deg, rgba(36,22,46,0.88) 0%, rgba(22,12,28,0.92) 100%);
        backdrop-filter: blur(24px) saturate(1.5); -webkit-backdrop-filter: blur(24px) saturate(1.5);
        border: 1px solid rgba(255,255,255,0.20);
        box-shadow: 0 1px 0 rgba(255,255,255,0.14) inset, 0 32px 90px -28px rgba(0,0,0,0.70), 0 0 0 1px rgba(244,58,92,0.30);
        color: #FFFFFF;
      }
      /* LIGHT THEME OVERRIDES */
      html.theme-light .aurora-bg, html.theme-light .aurora-grain::before { display: none !important; }
      html.theme-light .aurora-root::before { background: linear-gradient(160deg, #FBF5EE 0%, #FAF7F3 45%, #F5F0E6 100%) !important; }
      html.theme-light:has(.aurora-root), html.theme-light body:has(.aurora-root) { background: #FAF7F3 !important; }
      html.theme-light .aurora-root, html.theme-light .aurora-root .glass, html.theme-light .aurora-root .glass-strong { color: #141414 !important; }
      html.theme-light .glass {
        background: rgba(255,255,255,0.92) !important;
        border: 1px solid rgba(80,60,30,0.10) !important;
        box-shadow: 0 1px 2px rgba(80,60,30,0.04), 0 8px 28px -10px rgba(80,60,30,0.10) !important;
        backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
      }
      html.theme-light .glass-strong {
        background: linear-gradient(160deg, #FFFFFF 0%, #F8F4EB 100%) !important;
        border: 1px solid rgba(80,60,30,0.12) !important;
        box-shadow: 0 1px 2px rgba(80,60,30,0.05), 0 18px 60px -20px rgba(188,0,45,0.18) !important;
        backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
      }
      html.theme-light .hero-kanji { background: linear-gradient(180deg, #BC002D 0%, #D91840 50%, #7C3AED 100%) !important; -webkit-background-clip: text !important; background-clip: text !important; color: transparent !important; filter: drop-shadow(0 4px 18px rgba(188,0,45,0.30)) !important; }
      html.theme-light .hero-ribbon { background: linear-gradient(90deg, rgba(188,0,45,0.10), rgba(124,58,237,0.10)) !important; border-color: rgba(80,60,30,0.18) !important; color: #141414 !important; }
      html.theme-light .hero-ribbon .jst-clock, html.theme-light .hero-ribbon .jst-clock * { color: #141414 !important; }
      html.theme-light .cat-tile.dark-tile { background: rgba(232,225,205,0.6) !important; border-color: rgba(80,60,30,0.10) !important; color: #3F3F3F !important; }
      html.theme-light .cat-tile.dark-tile.on { background: rgba(188,0,45,0.10) !important; border-color: rgba(188,0,45,0.40) !important; color: #BC002D !important; }
      /* THEME TOGGLE BUTTON */
      .theme-toggle {
        background: rgba(0,0,0,0.30); border: 1px solid rgba(255,255,255,0.18);
        color: rgba(255,255,255,0.92); padding: 8px 12px; border-radius: 100px;
        cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
        letter-spacing: 0.14em; text-transform: uppercase;
        display: inline-flex; align-items: center; gap: 8px;
        transition: background 0.2s, color 0.2s, transform 0.18s cubic-bezier(0.2,0.8,0.2,1);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .theme-toggle:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
      html.theme-light .theme-toggle { background: rgba(255,255,255,0.85) !important; border: 1px solid rgba(80,60,30,0.15) !important; color: #3F3F3F !important; backdrop-filter: none !important; }
      html.theme-light .theme-toggle:hover { background: #FFFFFF !important; }
      @media (max-width: 600px) {
        .theme-toggle { padding: 8px 10px; }
        .theme-toggle .toggle-label { display: none; }
      }
      /* MASSIVE HERO KANJI — gradient-filled display type */
      .hero-kanji {
        font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
        font-weight: 800;
        font-size: clamp(96px, 22vw, 220px);
        line-height: 0.86; letter-spacing: 0.04em;
        background: linear-gradient(180deg, #FFFAF0 0%, #FFD580 38%, #D91840 70%, #BC002D 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        animation: kanjiGlow 5s ease-in-out infinite;
        filter: drop-shadow(0 4px 24px rgba(188,0,45,0.45));
      }
      /* HERO RIBBON */
      .hero-ribbon {
        display: inline-flex; align-items: center; gap: 10px; padding: 6px 14px;
        background: linear-gradient(90deg, rgba(188,0,45,0.18), rgba(124,58,237,0.18));
        border: 1px solid rgba(255,255,255,0.18); border-radius: 100px;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 11px; letter-spacing: 0.18em;
        text-transform: uppercase; color: rgba(255,255,255,0.92);
      }
      .hero-ribbon .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #34D399; box-shadow: 0 0 10px rgba(52,211,153,0.8); animation: liveDot 1.6s ease-in-out infinite; }
      /* ACTIVITY RINGS */
      .ring-stack { position: relative; display: inline-block; }
      .ring-stack svg { display: block; }
      .ring-stack .label-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
      /* MEGA CTA */
      .mega-cta {
        position: relative; isolation: isolate; overflow: hidden;
        background: linear-gradient(135deg, #F43A5C 0%, #BC002D 50%, #8E0021 100%);
        background-size: 220% 220%; background-position: 0% 50%;
        color: #fff; border: 1px solid rgba(255,255,255,0.22);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.35),
          inset 0 -2px 0 rgba(0,0,0,0.25),
          0 4px 0 #5C0016,
          0 12px 30px -8px rgba(188,0,45,0.65),
          0 24px 60px -20px rgba(188,0,45,0.55);
        transition: background-position 0.5s ease, transform 0.18s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.25s ease;
      }
      .mega-cta:hover:not(:disabled) {
        background-position: 100% 50%; transform: translateY(-2px);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -2px 0 rgba(0,0,0,0.25), 0 6px 0 #5C0016, 0 18px 38px -8px rgba(188,0,45,0.75), 0 32px 72px -20px rgba(188,0,45,0.65);

      .mega-cta:active:not(:disabled) { transform: translateY(2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 1px 0 #5C0016, 0 6px 14px -4px rgba(188,0,45,0.55); }
      .mega-cta::after { content: ""; position: absolute; top: 0; left: -30%; bottom: 0; width: 30%; background: linear-gradient(100deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%); animation: briefShine 3.4s ease-in-out infinite; pointer-events: none; }
      .mega-cta:disabled { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); box-shadow: none; cursor: not-allowed; }
      .mega-cta:disabled::after { display: none; }
      /* STICKY MOBILE CTA */
      .sticky-cta-mobile { display: none; }
      @media (max-width: 600px) {
        .sticky-cta-mobile { display: flex; position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 50; padding: 16px 22px; align-items: center; justify-content: center; gap: 12px; font-size: 13px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; font-family: 'Inter', system-ui, sans-serif; border-radius: 14px; }

      .cat-tile.dark-tile:hover:not(:disabled) { background: rgba(255,255,255,0.09); border-color: rgba(188,0,45,0.45); }
      .cat-tile.dark-tile.on { background: rgba(188,0,45,0.20); border-color: rgba(217,24,64,0.55); color: #fff; }
      /* JST CLOCK */
      .jst-clock { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; font-size: 12px; letter-spacing: 0.06em; color: rgba(255,255,255,0.85); display: inline-flex; align-items: center; gap: 8px; }
      .jst-clock .sec { color: rgba(255,255,255,0.55); font-size: 10px; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
      }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

      input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: #BC002D; border-radius: 50%; cursor: pointer; border: 2px solid #FAF7F3; box-shadow: 0 1px 4px rgba(188,0,45,0.35); }
      input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; background: #BC002D; border-radius: 50%; cursor: pointer; border: 2px solid #FAF7F3; box-shadow: 0 1px 4px rgba(188,0,45,0.35); }
